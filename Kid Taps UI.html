<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Kid Taps — UI / UX</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="screens.css" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; font-family: 'Space Grotesk', system-ui, sans-serif; }
  #root { height: 100vh; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="android-frame.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>

<script type="text/babel" data-presets="react">
function PhoneFrame({ children }) {
  return (
    <AndroidDevice width={412} height={892}>
      {children}
    </AndroidDevice>
  );
}

function UiApp() {
  return (
    <DesignCanvas
      title="Kid Taps · UI / UX"
      subtitle="6 screens for the Android tap game · accessibility-first · big targets, calm motion, parent gate"
    >
      <DCSection id="flow" title="Core Flow" subtitle="Home → Setup → Countdown → Game → Result, plus Settings">
        <DCArtboard id="s1" label="01 · Home" width={428} height={908}>
          <PhoneFrame><HomeScreen /></PhoneFrame>
        </DCArtboard>
        <DCArtboard id="s2" label="02 · Teacher Setup" width={428} height={908}>
          <PhoneFrame><SetupScreen /></PhoneFrame>
        </DCArtboard>
        <DCArtboard id="s3" label="03 · Countdown" width={428} height={908}>
          <PhoneFrame><CountdownScreen /></PhoneFrame>
        </DCArtboard>
        <DCArtboard id="s4" label="04 · Game" width={428} height={908}>
          <PhoneFrame><GameScreen /></PhoneFrame>
        </DCArtboard>
        <DCArtboard id="s5" label="05 · Result" width={428} height={908}>
          <PhoneFrame><ResultScreen /></PhoneFrame>
        </DCArtboard>
        <DCArtboard id="s6" label="06 · Parent Settings" width={428} height={908}>
          <PhoneFrame><SettingsScreen /></PhoneFrame>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<UiApp />);
</script>
</body>
</html>
