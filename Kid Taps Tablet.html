<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Kid Taps — Tablet UI / UX</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tablet.css" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; font-family: 'Space Grotesk', system-ui, sans-serif; }
  #root { height: 100vh; }
  .tablet-frame {
    width: 100%; height: 100%;
    border-radius: 24px;
    overflow: hidden;
    background: #1A1A2E;
    border: 14px solid #1A1A2E;
    box-sizing: border-box;
    box-shadow: 0 30px 80px rgba(0,0,0,0.25);
    position: relative;
  }
  .tablet-frame .cam {
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #555;
    top: 50%;
    right: 4px;
    transform: translateY(-50%);
  }
  .tablet-inner {
    width: 100%; height: 100%;
    border-radius: 10px;
    overflow: hidden;
    background: #FFF8EC;
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tablet.jsx"></script>

<script type="text/babel" data-presets="react">
function Tablet({ children }) {
  return (
    <div className="tablet-frame">
      <div className="tablet-inner">{children}</div>
      <div className="cam"></div>
    </div>
  );
}

function App() {
  return (
    <DesignCanvas
      title="Kid Taps · Tablet UI / UX"
      subtitle="Landscape 1280×800 · full app coverage · 7 screens including animated language switch"
    >
      <DCSection id="core" title="Core Flow" subtitle="Home → Setup → Countdown → Game → Result">
        <DCArtboard id="t1" label="01 · Home" width={1308} height={828}>
          <Tablet><THome /></Tablet>
        </DCArtboard>
        <DCArtboard id="t2" label="02 · Teacher Setup" width={1308} height={828}>
          <Tablet><TSetup /></Tablet>
        </DCArtboard>
        <DCArtboard id="t3" label="03 · Countdown" width={1308} height={828}>
          <Tablet><TCountdown /></Tablet>
        </DCArtboard>
        <DCArtboard id="t4" label="04 · Game (active)" width={1308} height={828}>
          <Tablet><TGame /></Tablet>
        </DCArtboard>
        <DCArtboard id="t5" label="05 · Game (paused overlay)" width={1308} height={828}>
          <Tablet><TGame paused /></Tablet>
        </DCArtboard>
        <DCArtboard id="t6" label="06 · Result" width={1308} height={828}>
          <Tablet><TResult /></Tablet>
        </DCArtboard>
      </DCSection>

      <DCSection id="meta" title="Meta &amp; Loading" subtitle="Settings, parent gate, animated language switch">
        <DCArtboard id="t7" label="07 · Parent Settings" width={1308} height={828}>
          <Tablet><TSettings /></Tablet>
        </DCArtboard>
        <DCArtboard id="t8" label="08 · Language Loading (animated)" width={1308} height={828}>
          <Tablet><TLangLoad /></Tablet>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
