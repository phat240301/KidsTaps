<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Kid Taps — Splash Screen Animations</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="splash.css" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; font-family: 'Space Grotesk', system-ui, sans-serif; }
  #root { height: 100vh; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="splashes.jsx"></script>

<script type="text/babel" data-presets="react">
function App() {
  return (
    <DesignCanvas
      title="Kid Taps · Splash Screens"
      subtitle="Three original arcade-style splash animations · 4:3 · ~3s · plays once then settles"
    >
      <DCSection id="splashes" title="Splash Variations" subtitle="Bold arcade · primary kid colors · sound-wave bars">
        <DCArtboard id="v1" label="01 · Bouncing Blocks" width={1024} height={768}>
          <SplashCard Component={SplashV1} />
        </DCArtboard>
        <DCArtboard id="v2" label="02 · Wave Burst" width={1024} height={768}>
          <SplashCard Component={SplashV2} />
        </DCArtboard>
        <DCArtboard id="v3" label="03 · Stacked Pop" width={1024} height={768}>
          <SplashCard Component={SplashV3} />
        </DCArtboard>
        <DCArtboard id="v4" label="04 · Coin Drop" width={1024} height={768}>
          <SplashCard Component={SplashV4} />
        </DCArtboard>
        <DCArtboard id="v5" label="05 · Lottie Mascot" width={1024} height={768}>
          <SplashCard Component={SplashV5} />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
