<!doctype html>
<html lang="en">
<head>

<title>Kid Taps — Logo Concepts</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="logos.css" />
<style>

</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="logos.jsx"></script>

<script type="text/babel" data-presets="react">
function LogoApp() {
  return (
    <DesignCanvas
      title="Kid Taps · Logo Concepts"
      subtitle="6 originals · primary kid colors · each shown as full art + app icon"
    >
      <DCSection id="logos" title="Logo Directions" subtitle="Bold arcade · Fredoka geometric sans · red / yellow / blue">
        <DCArtboard id="l1" label="01 · Tap Target" width={1100} height={620}><LogoC1 /></DCArtboard>
        <DCArtboard id="l2" label="02 · Block Stack" width={1100} height={620}><LogoC2 /></DCArtboard>
        <DCArtboard id="l3" label="03 · Tap Bubble" width={1100} height={620}><LogoC3 /></DCArtboard>
        <DCArtboard id="l4" label="04 · Pixel Burst" width={1100} height={620}><LogoC4 /></DCArtboard>
        <DCArtboard id="l5" label="05 · Smiley Tap" width={1100} height={620}><LogoC5 /></DCArtboard>
        <DCArtboard id="l6" label="06 · Arcade Badge" width={1100} height={620}><LogoC6 /></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<LogoApp />);
</script>
